<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CCDEW Alert</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── Theme variables ── */
body.dark{
  --bg:#1c1f26;
  --bg2:#22262f;
  --bg3:#2a2f3a;
  --border:#30363d;
  --text:#e6edf3;
  --text2:#8b949e;
  --accent:#58a6ff;
  --accent-bg:#58a6ff18;
}
body.light{
  --bg:#f6f8fa;
  --bg2:#ffffff;
  --bg3:#eaeef2;
  --border:#d0d7de;
  --text:#1c1f26;
  --text2:#656d76;
  --accent:#0969da;
  --accent-bg:#0969da12;
}

body{
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  font-size:12px;
  background:var(--bg);
  color:var(--text);
  width:320px;
  min-height:60px;
  overflow-x:hidden;
  overflow-y:auto;
  padding:10px;
}

/* ── Spinner ── */
.spinner-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px 0;
  gap:8px;
}
.spinner{
  width:22px;height:22px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-label{font-size:11px;color:var(--text2)}

/* ── Empty state ── */
.empty-state{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  padding:20px 12px;
  text-align:center;
  color:var(--text2);
  font-size:12px;
}
.empty-icon{font-size:22px}

/* ── Card ── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}

/* threat bar */
.threat-bar{
  height:4px;
  width:100%;
}
.threat-1{background:#8b949e}
.threat-2{background:#58a6ff}
.threat-3{background:#d29922}
.threat-4{background:#f85149}

.card-body{padding:10px 11px;display:flex;flex-direction:column;gap:7px}

/* row 1: urgency + nature */
.row-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap}

.urgency-badge{
  font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:10px;
  white-space:nowrap;
}
.u-immediate{background:#f8514922;color:#f85149}
.u-today    {background:#d2992222;color:#d29922}
.u-week     {background:#58a6ff22;color:#58a6ff}
.u-month    {background:#3fb95022;color:#3fb950}
.u-info     {background:#8b949e22;color:#8b949e}

.nature-badge{
  font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:10px;
  background:var(--accent-bg);color:var(--accent);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:140px;
}

/* row 2: subject */
.card-subject{
  font-size:12px;font-weight:700;
  color:var(--text);
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  line-height:1.4;
}

/* row 3: meta row */
.meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.domain-badge{
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;
  padding:1px 6px;border-radius:6px;
  background:var(--bg3);color:var(--text2);
  border:1px solid var(--border);
}
.severity-label{
  font-size:10px;color:var(--text2);
}

/* threat score label */
.threat-label{
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:6px;
  margin-left:auto;
}
.tl-1{background:#8b949e22;color:#8b949e}
.tl-2{background:#58a6ff22;color:#58a6ff}
.tl-3{background:#d2992222;color:#d29922}
.tl-4{background:#f8514922;color:#f85149}

/* specifics */
.specifics{
  font-size:11px;color:var(--text2);
  padding:6px 8px;
  background:var(--bg3);
  border-radius:6px;
  border-left:3px solid var(--border);
  display:flex;flex-direction:column;gap:3px;
}
.specific-item::before{content:'• ';color:var(--accent)}
.specific-item{line-height:1.4}

/* action hint */
.action-hint{
  font-size:10px;
  color:var(--text2);
  font-style:italic;
  line-height:1.4;
}

/* buttons */
.btn-row{display:flex;gap:5px;margin-top:2px}
.btn{
  flex:1;
  font-family:inherit;
  font-size:10px;font-weight:600;
  padding:5px 6px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--bg3);
  color:var(--text);
  cursor:pointer;
  text-align:center;
  transition:.12s;
  white-space:nowrap;
}
.btn:hover{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.btn:active{opacity:.75}
.btn-dashboard{
  background:var(--accent-bg);
  border-color:var(--accent);
  color:var(--accent);
}
.btn-dashboard:hover{background:var(--accent);color:#fff}

/* dismissed state */
.done-state{
  display:flex;align-items:center;gap:6px;
  padding:12px;
  font-size:11px;color:var(--text2);
}
</style>
</head>
<body>

<div id="root">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="spinner-label">Se verifică...</div>
  </div>
</div>

<script>
/* ── Theme detection ── */
(function applyTheme() {
  var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.className = dark ? 'dark' : 'light';
})();

/* ── Constants ── */
var URGENCY_MAP = {
  'immediate': {icon: '🚨', label: 'IMEDIAT',  cls: 'u-immediate'},
  'today':     {icon: '⏰', label: 'AZI',       cls: 'u-today'},
  'this_week': {icon: '📅', label: 'SĂPT',      cls: 'u-week'},
  'this_month':{icon: '📆', label: 'LUNĂ',      cls: 'u-month'},
  'no_deadline':{icon:'📁', label: 'INFO',      cls: 'u-info'}
};

var THREAT_LABELS = ['', 'SCĂZUT', 'MEDIU', 'RIDICAT', 'CRITIC'];
var THREAT_CLS    = ['', 'tl-1',   'tl-2',  'tl-3',    'tl-4'];
var THREAT_BAR    = ['', 'threat-1','threat-2','threat-3','threat-4'];

/* ── Helpers ── */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function storageKey(alert) {
  var d = alert.date || '';
  return escHtml(alert.subject) + '|' + escHtml(alert.from) + '|' + d;
}

function isSnoozed(key, cb) {
  browser.storage.local.get('ccdew_snoozed').then(function(res) {
    var snoozed = res.ccdew_snoozed || {};
    var entry = snoozed[key];
    if (entry && entry.until && Date.now() < entry.until) {
      cb(true);
    } else {
      cb(false);
    }
  });
}

function isDismissed(key, cb) {
  browser.storage.local.get('ccdew_dismissed').then(function(res) {
    var dismissed = res.ccdew_dismissed || {};
    cb(!!dismissed[key]);
  });
}

/* ── Render states ── */
function showEmpty() {
  document.getElementById('root').innerHTML =
    '<div class="empty-state">' +
    '<div class="empty-icon">✅</div>' +
    '<div>Nicio alertă pentru acest email.</div>' +
    '</div>';
}

function showDone(msg) {
  document.getElementById('root').innerHTML =
    '<div class="done-state">' +
    '<span style="font-size:16px">✅</span>' +
    '<span>' + escHtml(msg) + '</span>' +
    '</div>';
}

function showError(msg) {
  document.getElementById('root').innerHTML =
    '<div class="empty-state">' +
    '<div class="empty-icon">⚠️</div>' +
    '<div style="color:#f85149">' + escHtml(msg) + '</div>' +
    '</div>';
}

/* ── Render alert card ── */
function renderCard(alert) {
  var urgency = URGENCY_MAP[alert.urgency] || URGENCY_MAP['no_deadline'];
  var ts = Math.max(1, Math.min(4, parseInt(alert.threat_score, 10) || 1));
  var key = storageKey(alert);

  /* specifics — first 2 */
  var specificsHtml = '';
  if (alert.specifics && alert.specifics.length) {
    var items = alert.specifics.slice(0, 2);
    specificsHtml = '<div class="specifics">';
    for (var i = 0; i < items.length; i++) {
      specificsHtml += '<div class="specific-item">' + escHtml(items[i]) + '</div>';
    }
    specificsHtml += '</div>';
  }

  var actionHtml = alert.action_hint
    ? '<div class="action-hint">💡 ' + escHtml(alert.action_hint) + '</div>'
    : '';

  var html =
    '<div class="card">' +
      '<div class="threat-bar ' + THREAT_BAR[ts] + '"></div>' +
      '<div class="card-body">' +
        /* badges row */
        '<div class="row-badges">' +
          '<span class="urgency-badge ' + urgency.cls + '">' +
            urgency.icon + ' ' + urgency.label +
          '</span>' +
          '<span class="nature-badge">' + escHtml(alert.nature_label || alert.nature || '') + '</span>' +
        '</div>' +
        /* subject */
        '<div class="card-subject">' + escHtml(alert.subject || '(fără subiect)') + '</div>' +
        /* meta */
        '<div class="meta-row">' +
          '<span class="domain-badge">' + escHtml(alert.life_domain || '') + '</span>' +
          (alert.severity ? '<span class="severity-label">Sev: ' + escHtml(String(alert.severity)) + '</span>' : '') +
          '<span class="threat-label ' + THREAT_CLS[ts] + '">' + THREAT_LABELS[ts] + '</span>' +
        '</div>' +
        specificsHtml +
        actionHtml +
        /* buttons */
        '<div class="btn-row">' +
          '<button class="btn" id="btn-snooze">⏸ Snooze 24h</button>' +
          '<button class="btn" id="btn-dismiss">✕ Respinge</button>' +
          '<button class="btn btn-dashboard" id="btn-dash">⬡ Dashboard</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('root').innerHTML = html;

  /* Button: Snooze */
  document.getElementById('btn-snooze').addEventListener('click', function() {
    browser.storage.local.get('ccdew_snoozed').then(function(res) {
      var snoozed = res.ccdew_snoozed || {};
      snoozed[key] = {until: Date.now() + 24 * 60 * 60 * 1000};
      return browser.storage.local.set({ccdew_snoozed: snoozed});
    }).then(function() {
      showDone('Alertă snoozed pentru 24h.');
    });
  });

  /* Button: Dismiss */
  document.getElementById('btn-dismiss').addEventListener('click', function() {
    browser.storage.local.get('ccdew_dismissed').then(function(res) {
      var dismissed = res.ccdew_dismissed || {};
      dismissed[key] = {at: Date.now()};
      return browser.storage.local.set({ccdew_dismissed: dismissed});
    }).then(function() {
      showDone('Alertă respinsă.');
    });
  });

  /* Button: Dashboard */
  document.getElementById('btn-dash').addEventListener('click', function() {
    browser.tabs.create({url: 'http://127.0.0.1:8766'});
  });
}

/* ── Main logic ── */
function init() {
  /* Get current tab id */
  browser.tabs.query({active: true, currentWindow: true}).then(function(tabs) {
    if (!tabs || !tabs.length) {
      showError('Nu s-a putut detecta tab-ul activ.');
      return;
    }
    var tabId = tabs[0].id;

    /* Get displayed message */
    browser.messageDisplay.getDisplayedMessage(tabId).then(function(msg) {
      if (!msg) {
        showEmpty();
        return;
      }

      var subject = msg.subject || '';
      var fromAddr = '';
      if (msg.author) {
        fromAddr = msg.author;
      } else if (msg.from && msg.from.length) {
        fromAddr = msg.from[0].address || msg.from[0].name || '';
      }

      /* Ask background.js to match */
      browser.runtime.sendMessage({
        action: 'matchAlert',
        subject: subject,
        fromAddr: fromAddr
      }).then(function(resp) {
        if (!resp || !resp.alert) {
          showEmpty();
          return;
        }

        var alert = resp.alert;
        var key = storageKey(alert);

        /* Check snoozed */
        isSnoozed(key, function(snoozed) {
          if (snoozed) {
            showDone('Alertă snoozed (activ).');
            return;
          }
          /* Check dismissed */
          isDismissed(key, function(dismissed) {
            if (dismissed) {
              showDone('Alertă respinsă anterior.');
              return;
            }
            renderCard(alert);
          });
        });

      }).catch(function(err) {
        showError('Eroare background: ' + (err && err.message ? err.message : String(err)));
      });

    }).catch(function(err) {
      showError('Eroare mesaj: ' + (err && err.message ? err.message : String(err)));
    });

  }).catch(function(err) {
    showError('Eroare tab: ' + (err && err.message ? err.message : String(err)));
  });
}

/* Run after DOM ready */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
